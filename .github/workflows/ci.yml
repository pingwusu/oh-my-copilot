name: CI

# Windows-first per v2.0 stability commitment (see README + docs/architecture/v1.7-to-v2.0-roadmap.md).
# Cross-platform (ubuntu/macos) is v2.1+ scope per user 2026-05-25 decision.
# Rust workspace + smoke-e2e steps are deferred per ADRs:
#   - docs/adr/ADR-sparkshell-rust-blocked.md (Rust toolchain USER_REQUIRED)
#   - smoke-e2e requires Copilot CLI auth which CI runners don't have

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (windows-latest, node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/scripts/sync-plugin-mirror.js
      - run: node dist/scripts/verify-catalog.js
      - run: node dist/scripts/verify-plugin-bundle.js
      # Integration tests requiring real `copilot` CLI on PATH are excluded on CI runners
      # (copilot CLI is not installed in GitHub Actions Windows runners). These tests run
      # locally during development. See docs/adr/ADR-v2.0-public-release-deferred.md.
      - run: npx vitest run --exclude "src/__tests__/uninstall.test.ts" --exclude "src/__tests__/team-stop.test.ts" --exclude "src/__tests__/smoke-install.test.ts" --exclude "src/__tests__/copilot-config.hook-target.test.ts" --exclude "src/__tests__/team-stage-state.integration.test.ts"

  test-concurrent:
    # v2.2 EB-06 IPC mesh — heavy 8-process child_process.spawn concurrency
    # tests for the outbox/inbox/heartbeat surface. Lives in a separate
    # matrix lane so the default `test` job stays under 5 min. Activated
    # via OMCP_RUN_HEAVY_CONCURRENCY=1; tests use it.skipIf(!env) so they
    # skip silently elsewhere.
    name: Test (concurrent, windows-latest, node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]
    env:
      OMCP_RUN_HEAVY_CONCURRENCY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node dist/scripts/sync-plugin-mirror.js
      # Same CI exclude list as the default lane — only the env var differs.
      - run: npx vitest run --reporter=verbose --exclude "src/__tests__/uninstall.test.ts" --exclude "src/__tests__/team-stop.test.ts" --exclude "src/__tests__/smoke-install.test.ts" --exclude "src/__tests__/copilot-config.hook-target.test.ts" --exclude "src/__tests__/team-stage-state.integration.test.ts"
